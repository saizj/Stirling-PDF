name: Blasai — build & push to GHCR

# Minimal fork-only image build for Jesús's Blasai-PDF.
# Builds the embedded (backend + frontend) image and pushes it to GHCR so the
# NAS can `docker compose pull`. No Docker Hub / Maven / cosign secrets required:
# without MAVEN_PUBLIC_URL the Gradle build falls back to Maven Central.
# Trigger manually from the Actions tab (or: gh workflow run blasai-deploy.yml).

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: "STIRLING_FLAVOR to build (core = OSS/MIT, proprietary = parity with official image)"
        type: choice
        options:
          - core
          - proprietary
        default: core
      tag:
        description: "Image tag to publish"
        default: blasai

concurrency:
  group: blasai-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push embedded image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./docker/embedded/Dockerfile
          push: true
          # NAS is x86_64 — single-arch keeps builds fast.
          platforms: linux/amd64
          tags: ghcr.io/saizj/stirling-pdf:${{ inputs.tag }}
          build-args: |
            STIRLING_FLAVOR=${{ inputs.flavor }}
            VERSION_TAG=${{ inputs.tag }}-${{ github.sha }}
          cache-from: type=gha,scope=blasai
          cache-to: type=gha,mode=max,scope=blasai
